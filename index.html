<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股K线图</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>A股K线图查询</h1>
        
        <div class="search-bar">
            <input type="text" id="stockInput" placeholder="请输入股票名称或代码，如：贵州茅台、600519">
            <button id="searchBtn">查询</button>
        </div>
        
        <div class="timeframe-tabs">
            <button class="tab active" data-period="day">日线</button>
            <button class="tab" data-period="week">周线</button>
            <button class="tab" data-period="month">月线</button>
            <button class="tab" data-period="hour">小时线</button>
        </div>
        
        <div id="chartContainer" class="chart-container"></div>
        
        <div class="stock-info" id="stockInfo">
            <div class="info-item">
                <span class="label">股票名称：</span>
                <span id="stockName">-</span>
            </div>
            <div class="info-item">
                <span class="label">股票代码：</span>
                <span id="stockCode">-</span>
            </div>
            <div class="info-item">
                <span class="label">最新价格：</span>
                <span id="latestPrice">-</span>
            </div>
            <div class="info-item">
                <span class="label">涨跌幅：</span>
                <span id="changePercent">-</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
